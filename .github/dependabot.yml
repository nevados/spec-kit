version: 2
updates:
  # pip - security updates only; open-pull-requests-limit: 0 disables version updates
  - package-ecosystem: pip
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      pip-security:
        applies-to: security-updates
        patterns: ['*']
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: monthly
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
